# Lightweight stack for observability verification
services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: acs-local-kafka-cluster-01
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    healthcheck:
      test: curl -f -u "elastic:${ELASTIC_PASSWORD:-changeme}" http://localhost:9200/_cluster/health || exit 1
      interval: 10s
      retries: 10
    volumes:
      - es-data:/usr/share/elasticsearch/data

  es-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    depends_on:
      elasticsearch: { condition: service_healthy }
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_SYSTEM_PASSWORD:-changeme}
    command: >
      bash -c '
        until curl -sf -u "elastic:$${ELASTIC_PASSWORD}" http://elasticsearch:9200 | grep -q cluster_name; do sleep 2; done;
        curl -sf -X POST -u "elastic:$${ELASTIC_PASSWORD}" -H "Content-Type: application/json" http://elasticsearch:9200/_security/user/kibana_system/_password -d "{\"password\":\"$${KIBANA_SYSTEM_PASSWORD}\"}" ;
        echo "Setup complete";
        touch /tmp/setup-done;
        tail -f /dev/null
      '
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/setup-done"]
      interval: 5s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD:-changeme}
      - xpack.security.enabled=true
      - xpack.encryptedSavedObjects.encryptionKey=a3Lk9sd82jf0w4hg5Nf83jLsk4820fja
      - xpack.security.encryptionKey=b2Mk0te93kg1x5ih6Og94kMtl5931gkb
      - xpack.reporting.encryptionKey=c1Nl1uf04lh2y6ji7Ph05lNum6042hlc
    depends_on:
      es-setup: { condition: service_healthy }

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.17.0
    ports:
      - "8200:8200"
    command: >
      apm-server -e
        -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
        -E output.elasticsearch.username=elastic
        -E output.elasticsearch.password=${ELASTIC_PASSWORD:-changeme}
        -E apm-server.host=0.0.0.0:8200
        -E apm-server.kibana.enabled=true
        -E apm-server.kibana.host=http://kibana:5601
        -E apm-server.kibana.username=elastic
        -E apm-server.kibana.password=${ELASTIC_PASSWORD:-changeme}
    depends_on:
      es-setup: { condition: service_healthy }
      kibana: { condition: service_started }
    healthcheck:
      test: curl -sf http://localhost:8200/ | grep -q publish_ready || exit 1
      interval: 10s
      start_period: 60s
      retries: 15

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
      - "4318:4318"
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - ./docker/otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    depends_on:
      apm-server: { condition: service_started }
      elasticsearch: { condition: service_healthy }

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: h2,jdbc,local
      KAFKA_BROKERS: kafka:9092
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://otel-collector:4318/v1/logs
      OTEL_SAMPLING_PROBABILITY: "1.0"
      OTEL_METRICS_EXPORT_STEP: 10s
    depends_on:
      kafka: { condition: service_healthy }
      otel-collector: { condition: service_started }
    healthcheck:
      test: wget -qO- http://localhost:8888/actuator/health || exit 1
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 10

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      CONFIG_SERVER_URL: http://config-server:8888
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://otel-collector:4318/v1/logs
      OTEL_SAMPLING_PROBABILITY: "1.0"
      OTEL_METRICS_EXPORT_STEP: 10s
    depends_on:
      config-server: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      otel-collector: { condition: service_started }

networks:
  default:
    name: acs-net

volumes:
  es-data:
