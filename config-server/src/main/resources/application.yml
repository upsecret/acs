server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: jdbc

  datasource:
    url: ${ORACLE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${ORACLE_USER:config_user}
    password: ${ORACLE_PASS:config_pass}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5

  cloud:
    config:
      server:
        jdbc:
          sql: SELECT PROP_KEY, PROP_VALUE FROM PROPERTIES WHERE APPLICATION=? AND PROFILE=? AND LABEL=?
          order: 1
    bus:
      enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health, busrefresh
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
      deployment.environment: ${SPRING_PROFILES_ACTIVE:local}
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
        step: ${OTEL_METRICS_EXPORT_STEP:30s}
    tracing:
      export:
        endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
    logs:
      export:
        endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://localhost:4318/v1/logs}
