receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  # APM Server receives OTLP and creates proper APM indices
  # → Kibana APM UI (Service Inventory, Traces, Dependencies)
  otlphttp/apm:
    endpoint: http://apm-server:8200
    tls:
      insecure: true
  # Elasticsearch direct — for application logs (APM Server only indexes errors)
  elasticsearch/logs:
    endpoints: ["http://elasticsearch:9200"]
    user: elastic
    password: ${env:ELASTIC_PASSWORD}
    logs_dynamic_index:
      enabled: true
    mapping:
      mode: ecs
    sending_queue:
      enabled: true
      num_consumers: 2
      queue_size: 1000
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/apm]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/apm]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [elasticsearch/logs, debug]
